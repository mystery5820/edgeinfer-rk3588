models:
  - name: Qwen2.5-0.5B-Instruct
    task: text-generation
    backend: rkllm
    source_dir: models/llm/baseline/Qwen2.5-0.5B-Instruct
    runtime_model: models/llm/rkllm_outputs/qwen2_5_0_5b_instruct_w8a8_opt1_ctx2048_rk3588.rkllm
    quantization: W8A8
    max_context: 2048
    status: ready
    note: "RKLLM W8A8 模型已在 RK3588 板端完成初始化和交互式文本生成验证，runtime 版本为 1.3.0。"

  - name: Qwen2.5-1.5B-Instruct
    task: text-generation
    backend: rkllm
    source_dir: models/llm/baseline/Qwen2.5-1.5B-Instruct
    runtime_model: models/llm/rkllm_outputs/qwen2_5_1_5b_instruct_w8a8_opt1_ctx2048_rk3588.rkllm
    quantization: W8A8
    max_context: 2048
    status: baseline

  - name: YOLOv11n-INT8-Baseline
    task: object-detection
    backend: rknn
    source_dir: models/vision/yolo11
    runtime_model: models/vision/yolo11/rknn/yolo11n_baseline_i8_rk3588.rknn
    quantization: INT8
    input_size: [640, 640]
    status: debug
    note: "INT8 RKNN 可加载并推理，但当前板端验证中类别分支输出全为 0，暂不作为有效部署模型。"

  - name: YOLOv11n-FP-Baseline
    task: object-detection
    backend: rknn
    source_dir: models/vision/yolo11
    runtime_model: models/vision/yolo11/rknn/yolo11n_baseline_fp_rk3588.rknn
    quantization: FP
    input_size: [640, 640]
    status: ready