models:
  - name: Qwen2.5-0.5B-Instruct
    task: text-generation
    backend: rkllm
    source_dir: models/llm/baseline/Qwen2.5-0.5B-Instruct
    runtime_model: models/llm/rkllm_outputs/qwen2_5_0_5b_instruct_w8a8_opt1_ctx2048_rk3588.rkllm
    quantization: W8A8
    max_context: 2048
    status: ready
    note: "RKLLM W8A8 模型已在 RK3588 板端完成初始化和交互式文本生成验证，runtime 版本为 1.3.0。"

  - name: Qwen2.5-1.5B-Instruct
    task: text-generation
    backend: rkllm
    source_dir: models/llm/baseline/Qwen2.5-1.5B-Instruct
    runtime_model: models/llm/rkllm_outputs/qwen2_5_1_5b_instruct_w8a8_opt1_ctx2048_rk3588.rkllm
    quantization: W8A8
    max_context: 2048
    status: ready
    note: "RKLLM W8A8 模型已在 RK3588 板端完成初始化、交互式文本生成和自动 benchmark 验证，runtime 版本为 1.3.0。"


  - name: Qwen3-4B-W8A8-RK3588
    task: text-generation
    backend: rkllm
    source_dir: models/llm/qwen3/Qwen3-4B-W8A8-RK3588
    runtime_model: models/llm/rkllm_outputs/Qwen3-4B-w8a8-npu.rkllm
    quantization: W8A8
    max_context: 4096
    status: blocked
    note: "模型文件已下载并通过 SHA256 校验。RKNPU driver 已由 v0.9.2 升级到 v0.9.8，driver-too-low 问题已解除；DRM_GEM 稳定版下 RKLLM 可正常运行 Qwen2.5-1.5B，但 Qwen3-4B 仍因 4022272000 bytes NPU DMA/IOVA 映射失败而无法加载。DMA_HEAP 实验版可启动但 RKLLM runtime v1.3.0 无法打开 RKNPU/RKNN 设备，因此该模型当前保持 blocked。"

  - name: YOLOv11n-INT8-Baseline
    task: object-detection
    backend: rknn
    source_dir: models/vision/yolo11
    runtime_model: models/vision/yolo11/rknn/yolo11n_baseline_i8_rk3588.rknn
    quantization: INT8
    input_size: [640, 640]
    status: debug
    note: "INT8 RKNN 可加载并推理，但当前板端验证中类别分支输出全为 0，暂不作为有效部署模型。"

  - name: YOLOv11n-FP-Baseline
    task: object-detection
    backend: rknn
    source_dir: models/vision/yolo11
    runtime_model: models/vision/yolo11/rknn/yolo11n_baseline_fp_rk3588.rknn
    quantization: FP
    input_size: [640, 640]
    status: ready

  - name: Qwen3-VL-2B-Instruct-RKLLM-v1.2.3
    task: vision-language
    backend: qwen3-vl-rkllm-rknn-runner
    source_dir: models/vlm/qwen3-vl-2b-instruct-rkllm-v123
    vision_model: /userdata/edgeinfer-assets/models/vlm/qwen3-vl-2b-instruct-rkllm-v123/qwen3-vl-2b_vision_672_rk3588.rknn
    runtime_model: /userdata/edgeinfer-assets/models/vlm/qwen3-vl-2b-instruct-rkllm-v123/qwen3-vl-2b-instruct_w8a8_rk3588.rkllm
    quantization: W8A8
    vision_encoder_input: [672, 672]
    max_context: 1024
    status: ready
    note: "Qwen3-VL-2B true VLM backend validated on RK3588 with RKNN vision encoder and RKLLM decoder."

